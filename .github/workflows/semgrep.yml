name: Semgrep

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # 每週一 UTC 09:00（台灣時間週一下午 5 點）跑一次
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    name: semgrep/ci
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    # 不在 forked PR 上跑（fork 沒辦法存 secret，將來升級才不會壞）
    if: (github.actor != 'dependabot[bot]')
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: >-
          semgrep scan
          --config=p/default
          --config=p/python
          --config=p/security-audit
          --error
          --severity=ERROR
          --severity=WARNING
          --exclude=tests
          --metrics=off
