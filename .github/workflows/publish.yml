# Publish `agent-policy-gateway` to PyPI.
#
# Triggered by pushing a ``v*`` tag (or manually via ``workflow_dispatch``).
# The three jobs run in sequence:
#
#   1. ``test``    - install ``[dev]`` extras, run ruff, run pytest.
#   2. ``build``   - run ``python -m build`` and ``twine check --strict`` on
#                    the produced sdist + wheel. The artifacts are uploaded
#                    so the publish job can reuse them without rebuilding
#                    (and re-deriving a different file hash).
#   3. ``publish`` - download the artifacts and upload to PyPI using PyPI
#                    trusted publishing (OIDC) via
#                    ``pypa/gh-action-pypi-publish``. No long-lived API
#                    token is stored in the repo or in GitHub secrets;
#                    the OIDC handshake is keyed on the
#                    ``pypi`` GitHub environment and the workflow filename.
#
# The full release procedure (one-time PyPI trusted-publisher setup, the
# tag-and-push flow, the manual fallback, post-release verification) lives
# in ``docs/release.md`` (R14a). Structural invariants for this file are
# locked in by ``tests/test_publish_workflow.py``.

name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install project with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run ruff
        run: python -m ruff check .

      - name: Run pytest
        run: python -m pytest

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify distributions with twine check
        run: python -m twine check --strict dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: pypi
      url: https://pypi.org/project/agent-policy-gateway/
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
